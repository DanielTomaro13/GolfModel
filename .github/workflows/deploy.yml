name: Deploy site

# Builds the static Next.js site from the committed JSON feeds and publishes it to
# GitHub Pages. No secrets needed — it just deploys whatever data is committed.
# Runs on a push that touches web/ (including a data refresh from "Update data"),
# or on manual dispatch.
on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install deps
        working-directory: web
        run: npm ci
      - name: Build static site
        working-directory: web
        env:
          # Project-path host: danieltomaro13.github.io/GolfModel
          NEXT_PUBLIC_BASE_PATH: /GolfModel
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
